<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCO Metrics - Sign In</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body class="page-login">

<div class="login-container">
  <div class="logo-container">
    <div class="logo">
      <img src="../Assets/logo.png" alt="Rowe Casa Organics">
    </div>
    <h1>RCO Metrics</h1>
    <p class="subtitle">Operational Dashboards</p>
  </div>

  <button id="googleSignIn" class="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign in with Google
  </button>

  <div id="loadingIndicator" class="loading">
    <div class="spinner"></div>
    Signing you in...
  </div>

  <div id="errorMessage" class="error-message"></div>

  <div class="footer">
    Secure authentication powered by Firebase
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDEn7ooJJ1zATM5oEnx3ByDiOFTFxr_JiA",
  authDomain: "rco-metrics-d0f3b.firebaseapp.com",
  projectId: "rco-metrics-d0f3b",
  storageBucket: "rco-metrics-d0f3b.firebasestorage.app",
  messagingSenderId: "1021645263850",
  appId: "1:1021645263850:web:dfd5c7cd0bd99762679893",
  measurementId: "G-DR5MLDL5BG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const signInBtn = document.getElementById('googleSignIn');
const errorMessage = document.getElementById('errorMessage');
const loadingIndicator = document.getElementById('loadingIndicator');

auth.onAuthStateChanged((user) => {
  if (user) {
    const email = user.email;
    const allowedDomain = '@rowecasaorganics.com';

    if (email.endsWith(allowedDomain)) {
      window.location.replace('../index.html');
    } else {
      errorMessage.textContent = 'Access denied. Only @rowecasaorganics.com accounts are allowed.';
      errorMessage.classList.add('show');
      auth.signOut();
    }
  }
});

signInBtn.addEventListener('click', async () => {
  try {
    signInBtn.disabled = true;
    loadingIndicator.classList.add('show');
    errorMessage.classList.remove('show');

    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const email = user.email;
    const allowedDomain = '@rowecasaorganics.com';

    if (!email.endsWith(allowedDomain)) {
      await auth.signOut();

      errorMessage.textContent = 'Access denied. Only @rowecasaorganics.com accounts are allowed.';
      errorMessage.classList.add('show');
      signInBtn.disabled = false;
      loadingIndicator.classList.remove('show');
      return;
    }

    window.location.replace('../index.html');

  } catch (error) {
    console.error('Sign in error:', error);

    errorMessage.textContent = `Sign in failed: ${error.message}`;
    errorMessage.classList.add('show');

    signInBtn.disabled = false;
    loadingIndicator.classList.remove('show');
  }
});
</script>

</body>
</html>
